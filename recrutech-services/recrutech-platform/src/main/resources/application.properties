spring.application.name=recrutech-platform

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/recrutech_service?createDatabaseIfNotExist=true
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Liquibase Configuration
spring.liquibase.change-log=classpath:META-INF/liquibase-changelog-platform.xml
spring.liquibase.enabled=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# MinIO Configuration
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=recrutech-files

# JWT Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8082
app.auth.service.url=http://localhost:8082

# CORS Configuration
app.cors.allowed-origins=*

# Server Configuration
server.port=8080

# Logging Configuration
logging.level.com.recrutech.recrutechplatform=DEBUG
logging.level.org.springframework.security=DEBUG

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.database=0

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=300s
spring.cache.redis.cache-null-values=false

# Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.auth-service.register-health-indicator=true
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.slow-call-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.slow-call-duration-threshold=2s

# Retry Configuration
resilience4j.retry.instances.auth-service.max-attempts=3
resilience4j.retry.instances.auth-service.wait-duration=1s
